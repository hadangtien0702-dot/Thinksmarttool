<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thinksmart Tool</title>
  <!-- Google Fonts: Plus Jakarta Sans (UI) + Fira Code (code / mono) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
  <!-- Apply saved theme synchronously (before header paints) to avoid flash -->
  <script>
    try { if (localStorage.getItem('tst-theme') === 'dark') document.body.classList.add('dark-theme'); } catch (e) {}
  </script>

  <!-- App Wrapper -->
  <div class="app-container">
    
    <!-- Top Header -->
    <header class="app-header">
      <div class="header-left">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="9" cy="9" r="2"/>
            <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
          </svg>
        </div>
        <div class="brand-info">
          <h1>Thinksmart</h1>
          <span class="sub-brand">Tool</span>
        </div>
      </div>
      
      <div class="header-center">
        <div class="active-file-title" id="active-file-title">Chưa chọn thiết kế</div>
      </div>
      
      <div class="header-right">
        <button class="icon-btn tooltip" id="btn-theme-toggle" data-tooltip="Đổi giao diện Sáng / Tối" aria-label="Đổi giao diện sáng tối">
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="btn btn-secondary" id="btn-new-proposal">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
          Tạo Proposal Mới
        </button>
        <button class="btn btn-primary" id="btn-save-top" disabled>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Lưu File
        </button>
      </div>
    </header>

    <!-- Main Workspace -->
    <main class="app-body">
      
      <!-- Left Sidebar: Explorer -->
      <aside class="sidebar-left">
        <div class="sidebar-section search-wrapper">
          <div class="search-input-container">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" class="search-icon">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="search-input" placeholder="Tìm kiếm file thiết kế...">
          </div>
        </div>

        <div class="sidebar-section file-tree-section">
          <div class="section-title-container">
            <span>Công Cụ</span>
            <span class="file-count-badge" id="file-count">0</span>
          </div>
          <div class="tree-container" id="tree-container">
            <!-- Loading state -->
            <div class="loading-state">
              <div class="spinner"></div>
              <span>Đang quét thư mục...</span>
            </div>
          </div>
        </div>
      </aside>

      <!-- Center Viewport -->
      <section class="canvas-viewport">
        <!-- Canvas Toolbar -->
        <div class="viewport-toolbar">
          <div class="toolbar-group">
            <button class="toolbar-btn tooltip" id="btn-zoom-out" data-tooltip="Phóng to (Ctrl + -)">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <span class="zoom-indicator" id="zoom-value">100%</span>
            <button class="toolbar-btn tooltip" id="btn-zoom-in" data-tooltip="Thu nhỏ (Ctrl + +)">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button class="toolbar-btn tooltip" id="btn-zoom-fit" data-tooltip="Xem toàn bộ (Shift + 1)">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="4 14 4 20 10 20"/><polyline points="20 10 20 4 14 4"/>
                <polyline points="14 20 20 20 20 14"/><polyline points="10 4 4 4 4 10"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Canvas Container -->
        <div class="canvas-container grid-backdrop" id="canvas-container">
          <div class="canvas-wrapper" id="canvas-wrapper">
            <!-- Active SVG will be injected here -->
          </div>
          <div class="no-selection-message" id="no-selection">
            <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" class="pulse-icon">
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
            <h3>Chào mừng bạn đến với Thinksmart Tool</h3>
            <p>Chọn một bản thiết kế ở thanh bên trái để bắt đầu xem và chỉnh sửa.</p>
          </div>
        </div>

        <!-- Canvas Footer Status -->
        <footer class="canvas-status-bar">
          <div id="status-left">Sẵn sàng</div>
          <div id="status-right">Mẹo: Giữ Space và kéo chuột để di chuyển canvas</div>
        </footer>
      </section>

      <!-- Right Sidebar: Editor -->
      <aside class="sidebar-right" id="sidebar-right">
        <!-- Sidebar Title (replaces tabs) -->
        <div class="sidebar-right-header">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"/></svg>
          <span>SỬA CHỮ BẢN VẼ</span>
        </div>

        <!-- Tabs Content Container -->
        <div class="inspector-content">
          <!-- Text Editor (always active pane) -->
          <div class="tab-pane active" id="tab-texts">
            <div class="texts-list-container" id="texts-list">
              <!-- Dynamically populated -->
              <div class="no-data">Đang tải danh sách chữ...</div>
            </div>
          </div>
        </div>

        <!-- Export actions (always visible at the bottom) -->
        <div class="sidebar-actions-footer">
          <button class="btn btn-export-main btn-export-jpeg" id="btn-export-jpeg" disabled>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
            Xuất JPEG
          </button>
          <button class="btn btn-export-main btn-export-pdf" id="btn-export-pdf" disabled>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
            </svg>
            Xuất PDF
          </button>
        </div>
      </aside>

    </main>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js?v=9"></script>
  <!-- Theme toggle (light / dark) -->
  <script>
    (function () {
      var btn = document.getElementById('btn-theme-toggle');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var isDark = document.body.classList.toggle('dark-theme');
        try { localStorage.setItem('tst-theme', isDark ? 'dark' : 'light'); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
